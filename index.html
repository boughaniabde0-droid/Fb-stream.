<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الجيل التالي | مدير البث الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --dark: #0f172a;
            --light: #f8fafc;
            --success: #22c55e;
            --danger: #ef4444;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: #f1f5f9;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            min-height: 100vh;
            color: var(--dark);
        }

        /* Sidebar & Layout */
        .wrapper {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Glassmorphism Header */
        header {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .header-title h1 {
            font-size: 1.8rem;
            background: linear-gradient(to left, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 10px;
        }

        /* Inputs & Forms */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #475569;
        }

        input[type="text"], input[type="url"], input[type="password"], select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            transition: all 0.3s;
            background: #fff;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            outline: none;
        }

        /* Video Preview Area */
        .preview-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
            position: relative;
        }

        #videoPreview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1.1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        /* Stats Blocks */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-item {
            background: #f8fafc;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .stat-value {
            display: block;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        /* Active Stream Cards */
        .active-streams-section {
            margin-top: 30px;
        }

        .streams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stream-card-advanced {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            transition: all 0.3s;
        }

        .stream-card-advanced:hover {
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }

        .stream-thumb {
            height: 150px;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.2);
            position: relative;
        }

        .live-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--danger);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        .stream-content {
            padding: 20px;
        }

        .progress-bar {
            height: 6px;
            background: #eee;
            border-radius: 3px;
            margin: 10px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--success);
            width: 75%;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        @media (max-width: 992px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="main-content">
        <header>
            <div class="header-title">
                <h1><i class="fas fa-rocket"></i> نِظام البث السحابي v2.0</h1>
                <p>تحكم كامل بموارد البث والترجمة المباشرة</p>
            </div>
            <div class="user-status">
                <span id="connectionBadge" style="color: var(--success)"><i class="fas fa-circle"></i> متصل بالسيرفر</span>
            </div>
        </header>

        <div id="alertBox"></div>

        <div class="dashboard-grid">
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-plus-circle" style="color: var(--primary)"></i>
                    <h2>إنشاء جلسة بث احترافية</h2>
                </div>
                
                <form id="streamForm">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group">
                            <label>اسم القناة/البث</label>
                            <input type="text" id="streamName" placeholder="مثلاً: بث صلاة التراويح" required>
                        </div>
                        <div class="form-group">
                            <label>مفتاح البث (Stream Key)</label>
                            <input type="password" id="streamKey" placeholder="Paste rtmps:// key here" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>رابط المصدر (M3U8 / MP4 / YouTube)</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="url" id="sourceUrl" placeholder="https://example.com/live.m3u8" required style="flex: 1;">
                            <button type="button" onclick="previewSource()" style="width: auto; padding: 0 20px;" class="btn-primary">معاينة</button>
                        </div>
                    </div>

                    <div class="preview-container" id="previewArea">
                        <span id="previewPlaceholder"><i class="fas fa-play-circle fa-3x"></i><br>بانتظار الرابط...</span>
                        <video id="videoPreview" controls muted></video>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;">
                        <div class="card" style="padding: 15px; background: #f8fafc;">
                            <label><i class="fas fa-image"></i> العلامة المائية</label>
                            <input type="checkbox" id="enableWatermark" onchange="toggleWatermarkOptions()"> تفعيل
                            <div id="watermarkOptions" style="display:none; margin-top:10px;">
                                <input type="file" id="watermarkFile" style="font-size: 0.8rem;">
                                <select id="watermarkPosition" style="margin-top:5px;">
                                    <option value="top_right">أعلى اليمين</option>
                                    <option value="bottom_right">أسفل اليمين</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="card" style="padding: 15px; background: #f8fafc;">
                            <label><i class="fas fa-microchip"></i> الترميز (Encoding)</label>
                            <input type="checkbox" id="enableRencode" onchange="toggleQualityOptions()"> تفعيل GPU
                            <div id="qualityOptions" style="display:none; margin-top:10px;">
                                <select id="quality">
                                    <option value="720p">720p HD (Balanced)</option>
                                    <option value="1080p">1080p FHD (High CPU)</option>
                                    <option value="480p">480p SD (Low Data)</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary" style="margin-top: 20px;">
                        <i class="fas fa-broadcast-tower"></i> إطلاق البث الآن
                    </button>
                </form>
            </div>

            <div class="card">
                <div class="card-header">
                    <i class="fas fa-chart-line" style="color: var(--secondary)"></i>
                    <h2>حالة السيرفر</h2>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-value" id="activeCount">0</span>
                        <span style="font-size: 0.8rem; color: #64748b;">بث نشط</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="availableCount">11</span>
                        <span style="font-size: 0.8rem; color: #64748b;">متاح</span>
                    </div>
                </div>

                <div style="margin-top: 25px;">
                    <label>استهلاك المعالج (CPU)</label>
                    <div class="progress-bar"><div class="progress-fill" style="width: 20%; background: var(--primary);"></div></div>
                    
                    <label style="margin-top: 15px;">استهلاك الذاكرة (RAM)</label>
                    <div class="progress-bar"><div class="progress-fill" style="width: 45%; background: var(--secondary);"></div></div>
                    
                    <label style="margin-top: 15px;">سرعة الرفع (Upload)</label>
                    <div style="font-weight: bold; color: var(--success);"><i class="fas fa-arrow-up"></i> 45.2 Mbps</div>
                </div>
            </div>
        </div>

        <div class="active-streams-section">
            <div class="card-header">
                <i class="fas fa-list" style="color: var(--primary)"></i>
                <h2>البثوث الجارية حالياً</h2>
            </div>
            <div id="streamsList" class="streams-grid">
                </div>
        </div>
    </div>

    <script>
        // دالة معاينة الفيديو
        function previewSource() {
            const url = document.getElementById('sourceUrl').value;
            const video = document.getElementById('videoPreview');
            const placeholder = document.getElementById('previewPlaceholder');

            if(url) {
                video.src = url;
                video.style.display = 'block';
                placeholder.style.display = 'none';
                video.play().catch(e => console.log("المعاينة تتطلب مصدر فيديو مباشر"));
            }
        }

        // إظهار/إخفاء خيارات العلامة المائية
        function toggleWatermarkOptions() {
            const checked = document.getElementById('enableWatermark').checked;
            document.getElementById('watermarkOptions').style.display = checked ? 'block' : 'none';
        }

        function toggleQualityOptions() {
            const checked = document.getElementById('enableRencode').checked;
            document.getElementById('qualityOptions').style.display = checked ? 'block' : 'none';
        }

        // محاكاة تحديث القائمة (بناءً على الكود الأصلي الخاص بك مع تحسين التصميم)
        let streams = {};
        
        function updateStreamsList() {
            const container = document.getElementById('streamsList');
            const activeCount = Object.keys(streams).length;
            document.getElementById('activeCount').textContent = activeCount;
            document.getElementById('availableCount').textContent = 11 - activeCount;

            if (activeCount === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #94a3b8;">
                        <i class="fas fa-ghost fa-3x"></i>
                        <p style="margin-top: 10px;">لا توجد جلسات بث نشطة في الوقت الحالي</p>
                    </div>`;
                return;
            }

            container.innerHTML = Object.entries(streams).map(([id, stream]) => `
                <div class="stream-card-advanced">
                    <div class="stream-thumb">
                        <i class="fas fa-video fa-2x"></i>
                        <span class="live-tag">LIVE</span>
                    </div>
                    <div class="stream-content">
                        <h3 style="margin-bottom: 5px;">${stream.name}</h3>
                        <p style="font-size: 0.8rem; color: #64748b; margin-bottom: 10px;">
                            <i class="far fa-clock"></i> متصل منذ: ${stream.uptime || '12:40:00'}
                        </p>
                        
                        <div style="font-size: 0.85rem; margin-bottom: 15px;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                                <span>استقرار الإشارة</span>
                                <span style="color: var(--success)">98%</span>
                            </div>
                            <div class="progress-bar"><div class="progress-fill"></div></div>
                        </div>

                        <div style="display: flex; gap: 10px;">
                            <button onclick="stopStream('${id}')" class="btn-primary" style="background: #fee2e2; color: #ef4444; padding: 8px;">
                                <i class="fas fa-stop"></i> إيقاف
                            </button>
                            <button class="btn-primary" style="background: #f1f5f9; color: #475569; padding: 8px;">
                                <i class="fas fa-cog"></i> إعدادات
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // إضافة مستمع الحدث للنموذج (Form) كما في الكود الأصلي
        document.getElementById('streamForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            // ... (نفس منطق الـ Fetch الخاص بك مع رسائل تنبيه أجمل)
            alert("تم إرسال طلب بدء البث للسيرفر...");
        });

        // تشغيل أولي
        updateStreamsList();
    </script>
</body>
</html>
